# fly.toml app configuration file generated for running-tool on 2026-02-18T11:32:11+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'running-tool'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  RUST_LOG='trace'
  WEBAUTHN_RP_ID='running-tool.fly.dev'
  WEBAUTHN_RP_ORIGIN='https://running-tool.fly.dev'

